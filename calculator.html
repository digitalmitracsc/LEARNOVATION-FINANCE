<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DCF Calculator | LEARNOVATION FINANCE</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header class="header">

<div class="container">

<div class="logo">

<div class="logo-box">
LF
</div>

<div class="logo-text">
<h2>LEARNOVATION FINANCE</h2>
<p>Learn. Analyze. Invest.</p>
</div>

</div>

<a href="index.html" class="btn btn-secondary">
← Back
</a>

</div>

</header>


<section class="hero">

<div class="container">

<div class="section-title">

<h2>DCF Calculator</h2>

<p>
Calculate the Intrinsic Value of any company using the
Discounted Cash Flow Method.
</p>

</div>

<div class="calculator-box">
    <div class="calculator-grid">

    <div class="input-group">
        <label>Free Cash Flow (₹ Cr)</label>
        <input type="number" id="fcf" placeholder="Example: 10000">
    </div>

    <div class="input-group">
        <label>Growth Rate (%)</label>
        <input type="number" id="growth" placeholder="Example: 12">
    </div>

    <div class="input-group">
        <label>Discount Rate (%)</label>
        <input type="number" id="discount" placeholder="Example: 10">
    </div>

    <div class="input-group">
        <label>Terminal Growth (%)</label>
        <input type="number" id="terminal" placeholder="Example: 5">
    </div>

    <div class="input-group">
        <label>Shares Outstanding (Cr)</label>
        <input type="number" id="shares" placeholder="Example: 450">
    </div>

</div>

<div class="calculator-btn">

    <button id="calculateBtn" class="btn btn-primary">
        Calculate Intrinsic Value
    </button>

</div>

<div class="result-box">

    <h3>Intrinsic Value</h3>

    <h2 id="intrinsicValue">₹0</h2>

    <p id="valuationStatus">
        Enter values and click Calculate.
    </p>

</div>

<!-- Yahan inputs aayenge -->

</div>

</div>

</section>

<script src="js/calculator.js"></script>

</body>
</html>
